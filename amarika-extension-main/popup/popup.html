<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">A</div>
        <span class="logo-text">Amarika</span>
      </div>
    </header>

    <!-- Loading State -->
    <div id="loadingView" class="view">
      <div class="loading-spinner"></div>
      <p class="loading-text">Loading...</p>
    </div>

    <!-- Login View (when not signed in) -->
    <div id="loginView" class="view hidden">
      <div class="login-card">
        <div class="login-icon">🔐</div>
        <h2>Welcome to Amarika</h2>
        <p>Sign in to format documents and sync your templates</p>
        <button id="signInBtn" class="btn-google">
          <img src="../assets/google-icon.svg" alt="Google" width="18">
          <span>Sign in with Google</span>
        </button>
        <p class="login-note">Free tier: 5 formats/month</p>
      </div>
    </div>

    <!-- Main View (when signed in) -->
    <div id="mainView" class="view hidden">
      <!-- User Header -->
      <div class="user-bar">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <div class="user-info">
          <span id="userName" class="user-name"></span>
          <span id="userTier" class="user-tier">Free</span>
        </div>
        <button id="signOutBtn" class="btn-icon" title="Sign Out">
          <span>↪</span>
        </button>
      </div>

      <!-- Document Status -->
      <div id="docStatus" class="doc-status">
        <div class="status-header">
          <span id="statusIcon" class="status-icon">🔍</span>
          <span id="statusTitle" class="status-title">Detecting...</span>
        </div>
        <div id="statusUrl" class="status-url"></div>
      </div>

      <!-- Template Selector -->
      <div class="form-group">
        <div class="form-header">
          <label for="templateSelect">Template</label>
          <button id="manageTemplatesBtn" class="btn-link">✏️ Manage</button>
        </div>
        <select id="templateSelect">
          <option value="">Loading templates...</option>
        </select>
        <div id="templateInfo" class="template-info"></div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons">
        <!-- Format Button -->
        <button id="formatBtn" class="btn-primary" disabled>
          <span class="btn-text">
            <span>✨</span>
            <span>Format Document</span>
          </span>
        </button>

        <!-- AI Assistant Button -->
        <button id="aiBtn" class="btn-ai">
          <span>🤖</span>
          <span>AI Assistant</span>
        </button>
      </div>

      <!-- Template Limit -->
      <div id="templateLimit" class="template-limit">
        <span id="templateLimitText">Templates: 0/1</span>
      </div>

      <!-- Upgrade Banner (shown for free users) -->
      <div id="upgradeBanner" class="upgrade-banner">
        <div class="upgrade-content">
          <span class="upgrade-icon">⚡</span>
          <div class="upgrade-text">
            <strong>Upgrade to Pro</strong>
            <span>Import from Doc, AI features, 10 templates</span>
          </div>
        </div>
        <button id="upgradeBtn" class="btn-upgrade">₹299/mo</button>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
      <span id="toastIcon" class="toast-icon"></span>
      <span id="toastMessage" class="toast-message"></span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
